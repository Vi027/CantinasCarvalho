<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinas Carvalho</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="botao-escuro">
        <input type="checkbox" class="checkbox" id="botao-tema" />
        <label class="label" for="botao-tema">
            <img src="./img/sol.png" alt="Sol" class="img-sol">
            <img src="./img/lua.png" alt="Lua" class="img-lua">
            <div class="indicador"></div>
        </label>
    </div>

    <main class="container">
        
        <section class="secao-cardapio">
            <h1 class="titulo">Cardápio do dia</h1>
            <div class="cardapio-box">
                <div class="trilho">
                    <div class="item-mini">
                        <img src="./img/prato1.avif" alt="Prato 1">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato2.png" alt="Prato 2">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato3.jpg" alt="Prato 3">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato4.jpg" alt="Prato 4">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato5.jpg" alt="Prato 5">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato6.jpg" alt="Prato 6">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato7.webp" alt="Prato 7">
                    </div>
                    <div class="item-mini">
                        <img src="./img/prato8.jpg" alt="Prato 8">
                    </div>
                </div>
            </div>
        </section>

        <section class="secao-lanches">
            <h1 class="titulo">Lanches</h1>
            <div class="grid-lanches">
                
                <div class="card-lanche">
                    <img src="./img/misto-quente.avif" alt="Misto Quente">
                    <div class="card-info">
                        <div class="texto">
                            <h3>Misto-quente</h3>
                            <p>Pão francês, presunto, queijo...</p>
                        </div>
                        <button class="btn-carrinho">🛒</button>
                    </div>
                </div>

                <div class="card-lanche">
                    <img src="./img/pao-queijo.jpg" alt="Pão de Queijo">
                    <div class="card-info">
                        <div class="texto">
                            <h3>Pão de queijo</h3>
                            <p>Polvilho, queijo, leite, ovos...</p>
                        </div>
                        <button class="btn-carrinho">🛒</button>
                    </div>
                </div>

                <div class="card-lanche">
                    <img src="./img/coxinha.avif" alt="Coxinha">
                    <div class="card-info">
                        <div class="texto">
                            <h3>Coxinha</h3>
                            <p>Massa de trigo com frango...</p>
                        </div>
                        <button class="btn-carrinho">🛒</button>
                    </div>
                </div>

                <div class="card-lanche">
                    <img src="./img/esfirra.jpg" alt="Esfirra">
                    <div class="card-info">
                        <div class="texto">
                            <h3>Esfirra</h3>
                            <p>Massa de trigo com carne...</p>
                        </div>
                        <button class="btn-carrinho">🛒</button>
                    </div>
                </div>

            </div>
        </section>

        <nav class="menu-inferior">
            <div class="menu-box">
                <div class="icon-item logo">
                    <img src="./img/logo.png" alt="Logo">
                </div>
                <button class="icon-item">
                    <img src="./img/hamburguer.png" alt="Lanches">
                </button>
                <button class="icon-item">
                    <img src="./img/almoco.png" alt="Almoço">
                </button>
                <button class="icon-item">
                    <img src="./img/bebida.png" alt="Bebida">
                </button>
                <button class="icon-item">
                    <img src="./img/sobremesas.png" alt="Sobremesa">
                </button>
                <button class="icon-item">
                    <img src="./img/doces.png" alt="Doces">
                </button>
                <button class="icon-item">
                    <img src="./img/carrinho.png" alt="Carrinho">
                </button>
            </div>
        </nav>

    </main>

    <script src="script.js"></script>
</body>

</html>
