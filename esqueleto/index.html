<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>Cantinas Carvalho</title>
</head>
<body>
    <header class="cardapio">  <!-- Parte de cima do Cardapio --> 
        <nav class="cardapio-menu">
            <img src="./img/prato1.avif" alt="prato1">
            <img src="./img/prato2.png" alt="prato2">
            <img src="./img/prato3.jpg" alt="prato3">
            <img src="./img/prato4.jpg" alt="prato4">
            <img src="./img/prato5.jpg" alt="prato5">
            <img src="./img/prato6.jpg" alt="prato6">
            <img src="./img/prato7.webp" alt="prato7">
            <img src="./img/prato8.jpg" alt="prato8">
        </nav>
    </header>

     <h1> Lanches </h1>

     <div class="container-lanches">
        <div class="comida">
            <img src="./img/misto-quente.avif" alt="lanche1">
            <h2>Misto-Quente</h2>
            <h3>Pão francês, Presunto e Queijo</h3>
            <button>🛒</button>
       </div>

     <div class="comida">
            <img src="./img/pao-queijo.jpg" alt="lanche2">
            <h2>Pão de Queijo</h2>
            <h3>Polvilho, Queijo e Ovos</h3>
            <button>🛒</button>
        </div>

         <div class="comida">
            <img src="./img/coxinha.avif" alt="lanche3">
            <h2>Coxinha</h2>
            <h3>Massa de trigo com frango</h3>
            <button>🛒</button>
        </div>

        <div class="comida">
            <img src="./img/esfirra.jpg" alt="lanche4">
            <h2>Esfirra</h2>
            <h3>Massa de trigo com carne</h3>
            <button>🛒</button>
        </div>
     </div>

     <div class="container-emoji">
        <div class="emoji">
            <img src="./img/hamburguer.png" alt="hamburguer">
            <img src="./img/almoco.png" alt="almoco">
            <img src="./img/bebida.png" alt="bebida">
            <img src="./img/doces.png" alt="doces">
         </div>
     </div>
</body>
</html>
