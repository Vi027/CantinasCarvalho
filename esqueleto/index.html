<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinas Carvalho</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="header-topo">
        <!-- Logo na Esquerda -->
        <img src="./img/logo.png" alt="Logo" class="logo-principal">

        <!-- Botão de Tema na Direita -->
        <div class="botao-escuro">
            <input type="checkbox" class="checkbox" id="botao-tema" />
            <label for="botao-tema" class="label">
                <img src="./img/lua.png" alt="Lua" class="img-lua">
                <img src="./img/sol.png" alt="Sol" class="img-sol">
                <div class="indicador"></div>
            </label>
        </div>
    </header>

    <main class="container"> <!-- Início do conteúdo centralizado -->

        <section class="secao-banner">
            <!-- Textos e Imagem do Lanche -->
            <div class="banner-textos">
                <h1 class="titulo">Cantinas</h1>
                <h1 class="titulo2">Carvalho</h1>
                <p class="subtitulo">Onde o sabor encontra o carinho</p>
            </div>
            <div class="banner-img">
                <img src="./img/lanche-principal.png" alt="lanche-principal">
            </div>
        </section>

        <section class="categorias-grid">
            <button class="card-categoria" onclick="window.location.href='almoco.html'">
                <img src="./img/almoco.png" alt="Almoço">
            </button>
            <button class="card-categoria" onclick="window.location.href='lanches.html'">
                <img src="./img/hamburguer.png" alt="Lanches">
            </button>
            <button class="card-categoria" onclick="window.location.href='bebidas.html'">
                <img src="./img/bebida.png" alt="Bebidas">
            </button>
            <button class="card-categoria" onclick="window.location.href='sobremesas.html'">
                <img src="./img/sobremesas.png" alt="Sobremesas">
            </button>
            <button class="card-categoria" onclick="window.location.href='doces.html'">
                <img src="./img/doces.png" alt="Doces">
            </button>
            <button class="card-categoria" onclick="window.location.href='carrinho.html'">
                <img src="./img/carrinho.png" alt="Carrinho">
            </button>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
